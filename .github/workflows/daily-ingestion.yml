name: Daily Ingestion

on:
  schedule:
    # 10:00 AM IST = 04:30 UTC
    - cron: "30 4 * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scheduled ingestion
        env:
          EMBEDDING_PROVIDER: bge
          LLM_PROVIDER: mock
        run: python -m scheduler --once

      - name: Corpus status summary
        if: success()
        continue-on-error: true
        run: |
          python - <<'PY'
          try:
              from storage.metadata_store import MetadataStore

              metadata = MetadataStore()
              version = metadata.get_corpus_version()
              latest = metadata.get_latest_ingestion_run()
              print("active_version:", version.active_version if version else None)
              print("last_updated:", version.last_updated_from_sources if version else None)
              if latest:
                  print("last_run_status:", latest.get("status"))
                  print("documents_processed:", latest.get("documents_processed"))
                  print("chunks_written:", latest.get("chunks_written"))
          except Exception as exc:
              print(f"Could not read corpus status summary: {exc}")
          PY
